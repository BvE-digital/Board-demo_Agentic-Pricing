:var(--text-on-navy);overflow-y:auto}.agent-row{flex:42 1 0;display:flex;flex-direction:column;padding:16px 28px 22px;background:var(--surface);position:relative;overflow:hidden;transition:flex-grow .35s ease,flex-basis .35s ease,padding .35s ease}.agent-row.collapsed{flex:0 0 42px;padding-top:0;padding-bottom:0}.agent-cards{flex:1;min-height:0;display:flex;gap:14px}.agent-panel{flex:1 1 0;min-width:0;display:flex;flex-direction:column;background:var(--surface-card);border:var(--border-style);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;opacity:.55;transform:translateY(6px);transition:opacity .2s ease,transform .2s ease}.agent-panel.running,.agent-panel.complete{opacity:1;transform:translateY(0)}.agent-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex:none;padding-bottom:10px;border-bottom:var(--border-style)}.agent-name{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--brand-navy)}.agent-role{font-size:11px;color:var(--text-muted);margin-top:2px}.agent-status{display:flex;align-items:center;gap:6px;flex:none;white-space:nowrap}.status-label{font-size:11px;color:var(--text-muted)}.dot{width:9px;height:9px;border-radius:50%;flex:none}.dot-idle{background:#cbd5e1}.dot-running{background:var(--brand-lime);animation:pulse 1.2s ease-in-out infinite}.dot-complete{background:var(--brand-navy)}@keyframes pulse{0%,to{opacity:1}50%{opacity:.3}}.agent-log{flex:1;min-height:0;overflow-y:auto;margin-top:10px;display:flex;flex-direction:column;gap:3px}.log-line{font-family:DM Mono,monospace;font-size:12px;line-height:1.45;color:var(--text-muted);animation:fade-in .15s ease}.intermediate{flex:none;margin-top:8px;font-size:13px;font-style:italic;color:var(--brand-blue-mid);padding-left:8px;border-left:2px solid var(--brand-blue-mid);animation:slide-in .2s ease}.finding-slot{flex:none;margin-top:8px;transition:transform .4s ease,opacity .4s ease}.finding-slot.flowing{transform:translateY(-6p -radius:var(--radius);box-shadow:var(--shadow)}.results-table{width:100%;border-collapse:collapse;font-size:14px}.results-table th{position:sticky;top:0;background:var(--surface-navy-light);color:var(--brand-navy);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:10px 14px;border-bottom:var(--border-style);z-index:1}.results-table td{padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap}.results-table .num{text-align:right;font-variant-numeric:tabular-nums}.cell-name{font-weight:600;color:var(--text-primary)}.cell-agent{color:var(--text-muted)}.row-escalate{background:var(--finding-escalate)}.row-escalate .cell-name{color:var(--brand-magenta)}.chip-pos{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.3px;padding:2px 8px;border-radius:999px}.chip-pos.in{background:var(--finding-protected);color:#5a6e0f}.chip-pos.cost{background:var(--finding-monitor);color:#8a6d00}.exposure{font-weight:600}.exp-high{color:var(--brand-magenta)}.exp-medium{color:#b06a00}.exp-low{color:var(--brand-blue-mid)}.exp-none{color:var(--text-muted);font-weight:400}.action{font-weight:500}.act-escalate{color:var(--brand-magenta);font-weight:600}.act-reprice{color:#b06a00}.act-monitor{color:var(--brand-blue-mid)}.act-maintain{color:var(--text-muted)}.reset{position:fixed;bottom:14px;right:16px;font-size:11px;color:var(--text-muted);background:#fffc;border:var(--border-style);border-radius:var(--radius);padding:5px 12px;opacity:.5;transition:opacity .15s ease;z-index:10}.reset:hover{opacity:1}@keyframes fade-in{0%{opacity:0}to{opacity:1}}@keyframes slide-in{0%{opacity:0;transform:translate(-6px)}to{opacity:1;transform:translate(0)}}@keyframes flow-in{0%{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}</style>
